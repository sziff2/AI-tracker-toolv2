version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── API ────────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - storage_data:/app/storage
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Celery Worker ──────────────────────────────────────────────
  worker:
    build: .
    command: celery -A apps.worker.tasks worker --loglevel=info
    volumes:
      - .:/app
      - storage_data:/app/storage
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Celery Beat (scheduler) ────────────────────────────────────
  beat:
    build: .
    command: celery -A apps.worker.tasks beat --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      redis:
        condition: service_started

  # ── Streamlit UI ───────────────────────────────────────────────
  ui:
    build: .
    command: streamlit run apps/ui/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api

volumes:
  pgdata:
  storage_data:
